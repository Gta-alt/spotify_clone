# @format

name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t music-app .

      - name: Login to DockerHub
        run:
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}"
          --password-stdin

      - name: Tag image
        run: docker tag music-app ${{ secrets.DOCKER_USERNAME }}/music-app:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/music-app:latest

      # OPTIONAL: Deploy to VPS via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/music-app:latest
            docker stop music-app || true
            docker rm music-app || true
            docker run -d \
              --name music-app \
              -p 8000:8000 \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/music-app:latest
